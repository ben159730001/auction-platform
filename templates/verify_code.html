{% extends "layout.html" %}
{% block content %}

<div class="form-box">

    <h2 class="form-title">
        📩 輸入驗證碼
    </h2>

    <form method="POST">

        <div class="mb-3">

            <label class="form-label">
                6 位數驗證碼
            </label>

            <input
                type="text"
                name="code"
                class="form-control"
                maxlength="6"
                placeholder="請輸入驗證碼"
                required
            >

            <small class="text-muted">
                驗證碼 10 分鐘內有效。
            </small>

        </div>

        <button class="btn btn-shopee w-100">
            驗證
        </button>

        <div class="text-center mt-3">
            <a href="/forgot-password">重新取得驗證碼</a>
        </div>

    </form>

</div>

{% endblock %}
