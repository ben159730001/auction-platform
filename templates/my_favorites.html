{% extends "layout.html" %}

{% block content %}
<div class="container mt-4">
    <h2>我的收藏 ❤️</h2>

    {% if favorites %}
        <div class="row">
            {% for product in favorites %}
            <div class="col-md-4 mb-4">
                <div class="card h-100">
                    <img src="{{ product.image }}" class="card-img-top" style="height:220px; object-fit:cover;">

                    <div class="card-body">
                        <h5 class="card-title">{{ product.title }}</h5>
                        <p>目前價格：$ {{ product.current_price }}</p>
                        <p>收藏數：{{ product.favorite_count }}</p>

                        <a href="/product/{{ product.id }}" class="btn btn-primary">
                            查看商品
                        </a>

                        <a href="/favorite/{{ product.id }}" class="btn btn-outline-danger">
                            取消收藏
                        </a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    {% else %}
        <p class="text-muted">你目前還沒有收藏任何商品。</p>
    {% endif %}
</div>
{% endblock %}
