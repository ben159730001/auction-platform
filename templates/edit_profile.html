{% extends "layout.html" %}
{% block content %}

<div class="form-box">
    <h2 class="form-title">🖼️ 編輯個人頭像與封面</h2>

    <form method="POST" enctype="multipart/form-data">

        <div class="mb-4">
            <label class="form-label">目前頭像</label><br>
            <img
                src="{{ user.avatar or '/static/default-avatar.png' }}"
                style="width:120px;height:120px;border-radius:50%;object-fit:cover;border:4px solid #ff6b6b;"
            >
        </div>

        <div class="mb-3">
            <label class="form-label">上傳新頭像</label>
            <input
                name="avatar"
                type="file"
                accept="image/*"
                class="form-control"
            >
        </div>

        <div class="mb-4">
            <label class="form-label">目前封面</label><br>
            <img
                src="{{ user.banner or '/static/default-banner.png' }}"
                style="width:100%;max-height:220px;border-radius:18px;object-fit:cover;border:2px solid #eee;"
            >
        </div>

        <div class="mb-3">
            <label class="form-label">上傳新封面</label>
            <input
                name="banner"
                type="file"
                accept="image/*"
                class="form-control"
            >
        </div>

        <button class="btn btn-shopee w-100">
            儲存變更
        </button>

        <a
            href="/profile/{{ session.get('user_id') }}"
            class="btn btn-secondary w-100 mt-2"
        >
            返回個人頁
        </a>

    </form>
</div>

{% endblock %}
