{% extends "layout.html" %}
{% block content %}

<div class="form-box">

    <h2 class="form-title">
        🔑 重設密碼
    </h2>

    <form method="POST">

        <div class="mb-3">

            <label class="form-label">
                新密碼
            </label>

            <input
                type="password"
                name="password"
                class="form-control"
                placeholder="請輸入新密碼"
                required
            >

        </div>

        <div class="mb-3">

            <label class="form-label">
                確認新密碼
            </label>

            <input
                type="password"
                name="confirm_password"
                class="form-control"
                placeholder="請再次輸入新密碼"
                required
            >

        </div>

        <button class="btn btn-shopee w-100">
            重設密碼
        </button>

    </form>

</div>

{% endblock %}
