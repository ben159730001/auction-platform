{% extends "layout.html" %}
{% block content %}

<div class="form-box">

    <h2 class="form-title">
        🔐 忘記密碼
    </h2>

    <form method="POST">

        <div class="mb-3">

            <label class="form-label">
                請輸入註冊信箱
            </label>

            <input
                type="email"
                name="email"
                class="form-control"
                placeholder="例如：s123456@gm.student.ncut.edu.tw"
                required
            >

            <small class="text-muted">
                系統會產生 6 位數驗證碼，用來重設密碼。
            </small>

        </div>

        <button class="btn btn-shopee w-100">
            送出驗證碼
        </button>

        <div class="text-center mt-3">
            <a href="/login">返回登入</a>
        </div>

    </form>

</div>

{% endblock %}
